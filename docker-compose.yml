version: '3.8'

services:
  bili2txt-agent:
    build: .
    container_name: bili2txt-agent
    restart: unless-stopped

    # 挂载环境变量文件
    env_file:
      - .env

    # 挂载临时目录（用于存储下载的视频和音频文件）
    volumes:
      - ./temp:/app/temp

    # 如果需要查看日志，可以取消注释以下行
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"

    # 如果需要访问外部服务，可以取消注释以下行
    # ports:
    #   - "8080:8080"

    # 资源限制（可选）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G
